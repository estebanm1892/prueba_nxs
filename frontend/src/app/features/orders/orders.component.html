<app-layout pageTitle="Pedidos">
    <p>Listado obtenido desde el microservicio de pedidos.</p>

    @if (loading) {
        <div>Cargando pedidos...</div>
    }

    @if (error) {
        <div>{{ error }}</div>
    }

    @if (!loading && !error) {
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Cliente</th>
                    <th>Total</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody>
                @for (order of orders; track order.id) {
                <tr>
                    <td>{{ order.id }}</td>
                    <td>{{ order.customer }}</td>
                    <td>{{ order.total | currency }}</td>
                    <td>{{ order.status }}</td>
                </tr>
                }
            </tbody>
        </table>
    </div>
    }
</app-layout>
